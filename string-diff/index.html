<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字符串对比 — WebPages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       字符串对比工具 — String Diff
       风格延续 WebPages Warm Editorial 设计体系
       ================================================================ */

    :root {
      --paper:        #faf6f1;
      --paper-deep:   #f3ede4;
      --card:         #ffffff;
      --text:         #2c2416;
      --text-muted:   #8c7b65;
      --border:       #e8dccd;
      --accent:       #c9654b;
      --accent-glow:  #f0d5c9;
      --sage:         #5b7b5e;
      --sage-light:   #e8f0e5;
      --gold:         #b8954a;
      --gold-light:   #faf3e0;

      /* Diff 专用颜色 */
      --diff-del-bg:      #fde8e4;
      --diff-del-mark:    #e8453c;
      --diff-del-border:  #f5c5bf;
      --diff-add-bg:      #e3f5e6;
      --diff-add-mark:    #2e9e50;
      --diff-add-border:  #b8e4c0;
      --diff-del-char-bg: #ffc3bb;
      --diff-add-char-bg: #9de4aa;

      --shadow-sm:    0 1px 3px rgba(44, 36, 22, 0.05);
      --shadow-md:    0 4px 20px rgba(44, 36, 22, 0.07);
      --shadow-lg:    0 12px 40px rgba(44, 36, 22, 0.10);
      --radius-sm:    10px;
      --radius-md:    16px;
      --radius-lg:    24px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background-color: var(--paper);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* 噪点纹理 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 导航 ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 246, 241, 0.85);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #e8f2f0, #c9e8e0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2e7d6e;
      font-size: 16px;
      flex-shrink: 0;
    }
    .header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .header-spacer { width: 80px; }

    /* ===== 主体 ===== */
    .main {
      flex: 1;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
      padding: 24px 24px 40px;
      position: relative;
      z-index: 1;
    }

    /* ===== 模式切换 ===== */
    .mode-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .mode-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-right: 4px;
    }
    .mode-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s;
      font-family: inherit;
    }
    .mode-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(201, 101, 75, 0.28);
    }

    /* ===== 操作栏 ===== */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1.5px solid transparent;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s;
      font-family: inherit;
      line-height: 1;
    }
    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(201, 101, 75, 0.25);
    }
    .btn-primary:hover {
      background: #b8553b;
      border-color: #b8553b;
      box-shadow: 0 4px 16px rgba(201, 101, 75, 0.35);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border-color: transparent;
    }
    .btn-ghost:hover {
      color: var(--accent);
      background: rgba(201, 101, 75, 0.06);
    }

    .spacer { flex: 1; }

    /* ===== 双栏输入区 ===== */
    .editors-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 720px) {
      .editors-grid { grid-template-columns: 1fr; }
    }

    .editor-panel {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s;
    }
    .editor-panel:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-sm);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--paper-deep);
    }
    .editor-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .editor-label .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-left  { background: var(--diff-del-mark); }
    .dot-right { background: var(--diff-add-mark); }

    .editor-meta {
      font-size: 11px;
      color: #bbb5ab;
      font-family: 'DM Mono', monospace;
    }

    .editor-textarea {
      flex: 1;
      width: 100%;
      min-height: 220px;
      padding: 14px;
      border: none;
      outline: none;
      resize: vertical;
      font-size: 13.5px;
      font-family: 'DM Mono', 'Courier New', monospace;
      color: var(--text);
      background: transparent;
      line-height: 1.65;
    }
    .editor-textarea::placeholder {
      color: #c8bfb4;
      font-style: italic;
    }

    /* ===== 汇总信息条 ===== */
    .summary-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--card);
      margin-bottom: 20px;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
      flex-wrap: wrap;
    }
    .summary-bar.visible { display: flex; }

    .summary-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .summary-icon.identical {
      background: var(--sage-light);
      color: var(--sage);
    }
    .summary-icon.different {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .summary-text {
      flex: 1;
      min-width: 0;
      color: var(--text);
      font-size: 13.5px;
      line-height: 1.5;
    }
    .summary-text strong {
      font-weight: 600;
    }
    .summary-text .tag-del {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      background: var(--diff-del-bg);
      color: var(--diff-del-mark);
      font-size: 11.5px;
      font-weight: 600;
      margin: 0 2px;
    }
    .summary-text .tag-add {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      background: var(--diff-add-bg);
      color: var(--diff-add-mark);
      font-size: 11.5px;
      font-weight: 600;
      margin: 0 2px;
    }
    .summary-text .tag-same {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      background: var(--paper-deep);
      color: var(--text-muted);
      font-size: 11.5px;
      font-weight: 600;
      margin: 0 2px;
    }

    .summary-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .stat-chip.del {
      background: var(--diff-del-bg);
      color: var(--diff-del-mark);
      border: 1px solid var(--diff-del-border);
    }
    .stat-chip.add {
      background: var(--diff-add-bg);
      color: var(--diff-add-mark);
      border: 1px solid var(--diff-add-border);
    }
    .stat-chip.same {
      background: var(--paper-deep);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* ===== 结果区域 ===== */
    .result-section {
      display: none;
      flex-direction: column;
      gap: 0;
    }
    .result-section.visible { display: flex; }

    .result-header-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 0;
    }
    @media (max-width: 720px) {
      .result-header-row { grid-template-columns: 1fr; }
    }

    .result-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      border: 1.5px solid var(--border);
      border-bottom: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .result-panel-header.left {
      background: linear-gradient(to right, rgba(253, 232, 228, 0.5), rgba(250, 246, 241, 0.3));
      color: var(--diff-del-mark);
      border-color: var(--diff-del-border);
    }
    .result-panel-header.right {
      background: linear-gradient(to right, rgba(227, 245, 230, 0.5), rgba(250, 246, 241, 0.3));
      color: var(--diff-add-mark);
      border-color: var(--diff-add-border);
    }

    /* 双栏对比结果 */
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 720px) {
      .result-grid { grid-template-columns: 1fr; }
    }

    .result-panel {
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      border: 1.5px solid var(--border);
      border-top: none;
      background: var(--card);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .result-panel.left  { border-color: var(--diff-del-border); }
    .result-panel.right { border-color: var(--diff-add-border); }

    .result-content {
      padding: 14px;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 120px;
    }

    /* 逐字符高亮 */
    .char-del {
      background: var(--diff-del-char-bg);
      color: #c0291f;
      border-radius: 2px;
      padding: 0 1px;
    }
    .char-add {
      background: var(--diff-add-char-bg);
      color: #1a6e30;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* 按行高亮 */
    .line-row {
      display: flex;
      align-items: flex-start;
      gap: 0;
      border-bottom: 1px solid transparent;
    }
    .line-num {
      width: 36px;
      min-width: 36px;
      padding: 0 8px 0 4px;
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #ccc4b8;
      user-select: none;
      line-height: 1.75;
      flex-shrink: 0;
    }
    .line-content {
      flex: 1;
      min-width: 0;
      line-height: 1.75;
    }
    .line-row.del {
      background: var(--diff-del-bg);
      border-color: var(--diff-del-border);
    }
    .line-row.add {
      background: var(--diff-add-bg);
      border-color: var(--diff-add-border);
    }
    .line-row.del .line-num { color: #d98080; }
    .line-row.add .line-num { color: #6dba7e; }

    .line-marker {
      width: 16px;
      min-width: 16px;
      text-align: center;
      font-size: 12px;
      line-height: 1.75;
      flex-shrink: 0;
    }
    .line-row.del .line-marker { color: var(--diff-del-mark); }
    .line-row.add .line-marker { color: var(--diff-add-mark); }
    .line-row.same .line-marker { color: transparent; }

    /* ===== 空状态 / 全等提示 ===== */
    .empty-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
      gap: 8px;
    }
    .empty-hint svg {
      width: 32px; height: 32px;
      opacity: 0.35;
    }
    .empty-hint p {
      max-width: 260px;
      text-align: center;
      line-height: 1.6;
    }

    /* ===== 快速操作提示 ===== */
    .tip-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
    }
    .tip-bar kbd {
      display: inline-block;
      padding: 1px 6px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--paper-deep);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--text);
      color: #fff;
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d8d0c4; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- ===== 导航 ===== -->
  <header class="header">
    <div class="header-inner">
      <a href="../" class="back-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        返回首页
      </a>
      <div class="header-title">
        <div class="header-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12M8 12h12M8 17h12M4 7h.01M4 12h.01M4 17h.01"/>
          </svg>
        </div>
        <span class="header-name">字符串对比</span>
      </div>
      <div class="header-spacer"></div>
    </div>
  </header>

  <!-- ===== 主体 ===== -->
  <main class="main">

    <!-- 模式切换 -->
    <div class="mode-bar">
      <span class="mode-label">对比粒度：</span>
      <button class="mode-btn active" data-mode="char" onclick="setMode('char')">字符级</button>
      <button class="mode-btn" data-mode="word" onclick="setMode('word')">词语级</button>
      <button class="mode-btn" data-mode="line" onclick="setMode('line')">行级</button>
      <span class="spacer"></span>
      <button class="btn btn-ghost" onclick="swapTexts()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
        </svg>
        互换
      </button>
      <button class="btn btn-ghost" onclick="clearAll()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        清空
      </button>
    </div>

    <!-- 双栏输入 -->
    <div class="editors-grid">
      <!-- 左侧：原始文本 -->
      <div class="editor-panel">
        <div class="editor-header">
          <div class="editor-label">
            <span class="dot dot-left"></span>
            原始文本
          </div>
          <span class="editor-meta" id="leftMeta">0 字符</span>
        </div>
        <textarea
          class="editor-textarea"
          id="leftInput"
          placeholder="在此粘贴或输入原始文本..."
        ></textarea>
      </div>

      <!-- 右侧：对比文本 -->
      <div class="editor-panel">
        <div class="editor-header">
          <div class="editor-label">
            <span class="dot dot-right"></span>
            对比文本
          </div>
          <span class="editor-meta" id="rightMeta">0 字符</span>
        </div>
        <textarea
          class="editor-textarea"
          id="rightInput"
          placeholder="在此粘贴或输入要对比的文本..."
        ></textarea>
      </div>
    </div>

    <!-- 汇总信息条 -->
    <div class="summary-bar" id="summaryBar">
      <div class="summary-icon" id="summaryIcon">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <div class="summary-text" id="summaryText"></div>
      <div class="summary-stats" id="summaryStats"></div>
    </div>

    <!-- 对比结果区域 -->
    <div class="result-section" id="resultSection">
      <!-- 列头 -->
      <div class="result-header-row">
        <div class="result-panel-header left">
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 12H4m0 0l8-8m-8 8l8 8"/>
          </svg>
          原始文本 — 差异标记
        </div>
        <div class="result-panel-header right">
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 12h16m0 0l-8-8m8 8l-8 8"/>
          </svg>
          对比文本 — 差异标记
        </div>
      </div>
      <!-- 双栏结果 -->
      <div class="result-grid">
        <div class="result-panel left">
          <div class="result-content" id="leftResult"></div>
        </div>
        <div class="result-panel right">
          <div class="result-content" id="rightResult"></div>
        </div>
      </div>
    </div>

    <!-- 快捷键提示 -->
    <div class="tip-bar">
      <span>提示：</span>
      <kbd>Ctrl</kbd><span>+</span><kbd>Enter</kbd>
      <span>快速对比</span>
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* ================================================================
       字符串 Diff 核心逻辑
       支持三种模式：字符级 / 词语级 / 行级
       算法：Myers diff (最长公共子序列 LCS 变体)
       ================================================================ */

    let currentMode = 'char';

    // ===== 工具函数 =====
    function showToast(msg, duration) {
      duration = duration || 1800;
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, duration);
    }

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
      runDiff();
    }

    function swapTexts() {
      var l = document.getElementById('leftInput');
      var r = document.getElementById('rightInput');
      var tmp = l.value;
      l.value = r.value;
      r.value = tmp;
      updateMeta();
      runDiff();
    }

    function clearAll() {
      document.getElementById('leftInput').value = '';
      document.getElementById('rightInput').value = '';
      updateMeta();
      runDiff();
    }

    function updateMeta() {
      var lv = document.getElementById('leftInput').value;
      var rv = document.getElementById('rightInput').value;
      document.getElementById('leftMeta').textContent = lv.length + ' 字符';
      document.getElementById('rightMeta').textContent = rv.length + ' 字符';
    }

    // ===== LCS / Myers Diff =====
    // 通用最长公共子序列，tokens 是数组
    function lcs(a, b) {
      var m = a.length, n = b.length;
      // 空间优化：只保留两行
      var dp = new Array(n + 1).fill(0);
      var prev = new Array(n + 1).fill(0);
      for (var i = 1; i <= m; i++) {
        prev = dp.slice();
        for (var j = 1; j <= n; j++) {
          if (a[i - 1] === b[j - 1]) {
            dp[j] = prev[j - 1] + 1;
          } else {
            dp[j] = Math.max(dp[j - 1], prev[j]);
          }
        }
      }
      return dp[n];
    }

    // Diff 算法：返回 [{type:'same'|'del'|'add', value:string}]
    function diff(aTokens, bTokens) {
      var m = aTokens.length;
      var n = bTokens.length;

      // 使用递归 + memoized backtracking 获得 edit ops
      // 先构建完整 DP 表
      var dp = [];
      for (var i = 0; i <= m; i++) {
        dp[i] = new Array(n + 1).fill(0);
      }
      for (var i = 1; i <= m; i++) {
        for (var j = 1; j <= n; j++) {
          if (aTokens[i - 1] === bTokens[j - 1]) {
            dp[i][j] = dp[i - 1][j - 1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
          }
        }
      }

      // Backtrack
      var ops = [];
      var i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && aTokens[i - 1] === bTokens[j - 1]) {
          ops.push({ type: 'same', value: aTokens[i - 1] });
          i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
          ops.push({ type: 'add', value: bTokens[j - 1] });
          j--;
        } else {
          ops.push({ type: 'del', value: aTokens[i - 1] });
          i--;
        }
      }
      ops.reverse();

      // 合并连续相同类型
      var merged = [];
      ops.forEach(function(op) {
        if (merged.length > 0 && merged[merged.length - 1].type === op.type) {
          merged[merged.length - 1].value += op.value;
        } else {
          merged.push({ type: op.type, value: op.value });
        }
      });
      return merged;
    }

    // ===== Tokenizers =====
    function tokenizeChar(str) {
      return str.split('');
    }
    function tokenizeWord(str) {
      // 按单词边界、标点、空白等分割，保留分隔符
      var tokens = [];
      var re = /(\s+|[^\w\u4e00-\u9fff]+|\w+|[\u4e00-\u9fff])/g;
      var m;
      while ((m = re.exec(str)) !== null) {
        tokens.push(m[0]);
      }
      return tokens;
    }
    function tokenizeLine(str) {
      // 按换行分割，保留每行末尾的换行符
      var lines = str.split('\n');
      var tokens = [];
      for (var i = 0; i < lines.length; i++) {
        tokens.push(lines[i] + (i < lines.length - 1 ? '\n' : ''));
      }
      // 去掉末尾空 token
      if (tokens.length > 0 && tokens[tokens.length - 1] === '') {
        tokens.pop();
      }
      return tokens;
    }

    // ===== 渲染函数 =====
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // 字符/词语级：将 ops 渲染为带高亮的 HTML（内联）
    function renderInline(ops, side) {
      var html = '';
      ops.forEach(function(op) {
        var escaped = escapeHtml(op.value);
        if (op.type === 'same') {
          html += escaped;
        } else if (op.type === 'del' && side === 'left') {
          html += '<span class="char-del">' + escaped + '</span>';
        } else if (op.type === 'add' && side === 'right') {
          html += '<span class="char-add">' + escaped + '</span>';
        } else if (op.type === 'del' && side === 'right') {
          // 右侧不显示删除内容（因为是"from left"视角）
          // 但为了对齐可以加空白占位——这里选择不渲染
        } else if (op.type === 'add' && side === 'left') {
          // 左侧不显示新增内容
        }
      });
      return html;
    }

    // 行级渲染
    function renderLine(ops, side) {
      var html = '';
      var lineNum = 1;

      // 分解为每行
      ops.forEach(function(op) {
        var lines = op.value.split('\n');
        lines.forEach(function(lineContent, idx) {
          if (idx > 0) lineNum++;
          // 是否是最后一个（无换行）
          var isLast = (idx === lines.length - 1 && op.value[op.value.length - 1] !== '\n');
          if (op.type === 'same') {
            html += '<div class="line-row same">'
              + '<span class="line-num">' + lineNum + '</span>'
              + '<span class="line-marker"> </span>'
              + '<span class="line-content">' + escapeHtml(lineContent) + '</span>'
              + '</div>';
          } else if (op.type === 'del') {
            if (side === 'left') {
              html += '<div class="line-row del">'
                + '<span class="line-num">' + lineNum + '</span>'
                + '<span class="line-marker">−</span>'
                + '<span class="line-content">' + escapeHtml(lineContent) + '</span>'
                + '</div>';
            }
            // 右侧跳过 del
          } else if (op.type === 'add') {
            if (side === 'right') {
              html += '<div class="line-row add">'
                + '<span class="line-num">' + lineNum + '</span>'
                + '<span class="line-marker">+</span>'
                + '<span class="line-content">' + escapeHtml(lineContent) + '</span>'
                + '</div>';
            }
            // 左侧跳过 add
          }
        });
      });
      return html;
    }

    // ===== 统计 =====
    function calcStats(ops) {
      var delCount = 0, addCount = 0, sameCount = 0;
      ops.forEach(function(op) {
        if (op.type === 'del')  delCount  += op.value.length;
        if (op.type === 'add')  addCount  += op.value.length;
        if (op.type === 'same') sameCount += op.value.length;
      });
      return { del: delCount, add: addCount, same: sameCount };
    }

    // 行级统计
    function calcLineStats(ops) {
      var delLines = 0, addLines = 0, sameLines = 0;
      ops.forEach(function(op) {
        var count = op.value.split('\n').length;
        if (op.value[op.value.length - 1] !== '\n') count = Math.max(count, 1);
        if (op.type === 'del')  delLines  += count;
        if (op.type === 'add')  addLines  += count;
        if (op.type === 'same') sameLines += count;
      });
      return { del: delLines, add: addLines, same: sameLines };
    }

    // ===== 主对比入口 =====
    function runDiff() {
      var leftVal  = document.getElementById('leftInput').value;
      var rightVal = document.getElementById('rightInput').value;

      var summaryBar    = document.getElementById('summaryBar');
      var summaryIcon   = document.getElementById('summaryIcon');
      var summaryText   = document.getElementById('summaryText');
      var summaryStats  = document.getElementById('summaryStats');
      var resultSection = document.getElementById('resultSection');
      var leftResult    = document.getElementById('leftResult');
      var rightResult   = document.getElementById('rightResult');

      // 两侧都为空时，隐藏结果
      if (!leftVal && !rightVal) {
        summaryBar.classList.remove('visible');
        resultSection.classList.remove('visible');
        return;
      }

      // 选择 tokenizer
      var tokenize;
      if (currentMode === 'char')      tokenize = tokenizeChar;
      else if (currentMode === 'word') tokenize = tokenizeWord;
      else                             tokenize = tokenizeLine;

      var aTokens = tokenize(leftVal);
      var bTokens = tokenize(rightVal);

      var ops = diff(aTokens, bTokens);

      // 统计
      var stats = (currentMode === 'line') ? calcLineStats(ops) : calcStats(ops);
      var isIdentical = (stats.del === 0 && stats.add === 0);
      var unit = currentMode === 'line' ? '行' : '个字符';

      // 更新汇总条
      summaryBar.classList.add('visible');

      if (isIdentical) {
        summaryIcon.className = 'summary-icon identical';
        summaryIcon.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>';
        summaryText.innerHTML = '<strong>两段文本完全相同</strong>，共 ' + stats.same + ' ' + unit + '，未发现任何差异。';
        summaryStats.innerHTML = '<span class="stat-chip same">✓ 完全相同</span>';
      } else {
        summaryIcon.className = 'summary-icon different';
        summaryIcon.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>';

        var modeLabel = currentMode === 'char' ? '字符级' : currentMode === 'word' ? '词语级' : '行级';
        var desc = '检测到差异（' + modeLabel + '对比）：'
          + '原始文本中有 <span class="tag-del">−' + stats.del + ' ' + unit + '</span> 被删除，'
          + '对比文本中有 <span class="tag-add">+' + stats.add + ' ' + unit + '</span> 新增，'
          + '共同保留 <span class="tag-same">' + stats.same + ' ' + unit + '</span>。';
        summaryText.innerHTML = desc;
        summaryStats.innerHTML = ''
          + '<span class="stat-chip del">− ' + stats.del + ' 删除</span>'
          + '<span class="stat-chip add">+ ' + stats.add + ' 新增</span>'
          + '<span class="stat-chip same">= ' + stats.same + ' 相同</span>';
      }

      // 渲染结果
      resultSection.classList.add('visible');

      if (currentMode === 'line') {
        leftResult.innerHTML  = renderLine(ops, 'left');
        rightResult.innerHTML = renderLine(ops, 'right');
      } else {
        leftResult.innerHTML  = renderInline(ops, 'left');
        rightResult.innerHTML = renderInline(ops, 'right');
      }
    }

    // ===== 事件绑定 =====
    var leftInput  = document.getElementById('leftInput');
    var rightInput = document.getElementById('rightInput');

    // 实时对比（带防抖）
    var diffTimer = null;
    function debouncedDiff() {
      updateMeta();
      clearTimeout(diffTimer);
      diffTimer = setTimeout(runDiff, 200);
    }

    leftInput.addEventListener('input', debouncedDiff);
    rightInput.addEventListener('input', debouncedDiff);

    // Ctrl+Enter 强制对比
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runDiff();
        showToast('✓ 对比完成');
      }
    });

    // 初始渲染
    updateMeta();
    runDiff();
  </script>
</body>
</html>
