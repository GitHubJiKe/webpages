<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 格式化工具 — WebPages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col">

  <!-- 顶部导航 -->
  <header class="sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="../" class="flex items-center gap-2 text-gray-500 hover:text-white transition-colors no-underline">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        <span class="text-sm">返回首页</span>
      </a>
      <div class="flex items-center gap-2">
        <span class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-sm font-bold" style="background: linear-gradient(135deg, #d4a853, #c97a3b);">{ }</span>
        <span class="font-semibold text-white" style="font-family: 'Cormorant Garamond', serif; font-size: 18px;">JSON 格式化</span>
      </div>
      <div class="w-20"></div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
    
    <!-- 工具栏 -->
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <button id="btnFormat" class="btn btn-primary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
        </svg>
        格式化
      </button>
      <button id="btnCompress" class="btn btn-secondary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 4h4v4m0 0L4 4m6 6l6 6m0-6h4v4"/>
        </svg>
        压缩
      </button>
      <button id="btnValidate" class="btn btn-secondary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        校验
      </button>
      <div class="flex-1"></div>
      <button id="btnCopy" class="btn btn-secondary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        复制结果
      </button>
      <button id="btnClear" class="btn btn-ghost">清空</button>
    </div>

    <!-- 缩进设置 -->
    <div class="flex items-center gap-4 mb-3 indent-group">
      <span>缩进：</span>
      <label class="flex items-center gap-1.5 cursor-pointer">
        <input type="radio" name="indent" value="2" checked> 2 空格
      </label>
      <label class="flex items-center gap-1.5 cursor-pointer">
        <input type="radio" name="indent" value="4"> 4 空格
      </label>
    </div>

    <!-- 编辑区：双栏 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" style="min-height: 500px;">
      <!-- 输入区 -->
      <div class="flex flex-col">
        <div class="flex items-center justify-between mb-1.5">
          <span class="section-label">输入</span>
          <span id="inputStatus" class="status-text"></span>
        </div>
        <textarea 
          id="inputArea"
          placeholder='粘贴 JSON 到这里，例如：&#10;{"name":"WebPages","version":1}'
          class="code-panel"
          spellcheck="false"
        ></textarea>
      </div>

      <!-- 输出区 -->
      <div class="flex flex-col">
        <div class="flex items-center justify-between mb-1.5">
          <span class="section-label">输出</span>
          <span id="outputStatus" class="status-text"></span>
        </div>
        <pre 
          id="outputArea"
          class="code-panel code-panel-output"
        ><code id="outputCode"></code></pre>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="errorBox" class="error-box hidden">
      <div class="flex items-start gap-2">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <div>
          <div class="font-medium mb-0.5">JSON 解析错误</div>
          <div id="errorMessage" class="text-sm"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- 统计栏 -->
  <footer class="stats-footer">
    <div class="max-w-7xl mx-auto px-4 flex items-center gap-6">
      <span id="charCount">字符：0</span>
      <span id="lineCount">行数：0</span>
      <span id="keyCount">键数：0</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
