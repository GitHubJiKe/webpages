<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Prompt Atelier — 提示词工坊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       The Prompt Atelier — Dark Gallery Aesthetic
       暗夜画廊 · 暖金点缀 · 衬线标题 · 画框式卡片
       ============================================================ */

    :root {
      --bg-deep:       #09090c;
      --bg-surface:    #111116;
      --bg-card:       #16161c;
      --bg-elevated:   #1c1c24;
      --bg-code:       #0e0e14;
      --text-primary:  #e4dfd8;
      --text-secondary:#a09888;
      --text-muted:    #6b6460;
      --gold:          #c49b5c;
      --gold-light:    #e2c28a;
      --gold-dim:      #8a6d42;
      --teal:          #689e9e;
      --teal-light:    #8ec6c6;
      --vermillion:    #c2543d;
      --vermillion-light: #e8735a;
      --border-subtle: rgba(196, 155, 92, 0.10);
      --border-active: rgba(196, 155, 92, 0.30);
      --border-gold:   rgba(196, 155, 92, 0.5);
      --shadow-sm:     0 1px 3px rgba(0,0,0,0.4);
      --shadow-md:     0 4px 24px rgba(0,0,0,0.5);
      --shadow-lg:     0 12px 48px rgba(0,0,0,0.6);
      --shadow-gold:   0 0 40px rgba(196, 155, 92, 0.08);
      --radius-sm:      6px;
      --radius-md:     12px;
      --radius-lg:     20px;
      --font-display:  'Playfair Display', 'Noto Serif SC', serif;
      --font-mono:     'DM Mono', 'JetBrains Mono', monospace;
      --font-ui:       -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font-ui);
      background-color: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
    }

    /* ---- 背景纹理 ---- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 400px 400px;
      pointer-events: none;
      z-index: 0;
    }

    /* ---- 聚光装饰 ---- */
    .spotlight {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      filter: blur(160px);
      opacity: 0.06;
    }
    .spotlight--top {
      top: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
    }
    .spotlight--bottom {
      bottom: -15%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--teal) 0%, transparent 70%);
      opacity: 0.04;
    }

    /* ---- 布局 ---- */
    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ---- Header ---- */
    .site-header {
      text-align: center;
      padding: 56px 0 40px;
      position: relative;
    }
    .site-header::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 28px auto 0;
    }
    .site-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .site-header h1 .accent {
      color: var(--gold);
      font-style: italic;
    }
    .site-header p {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    /* ---- Step Section ---- */
    .step-section {
      margin-bottom: 52px;
      animation: sectionIn 0.7s ease both;
    }
    .step-section:nth-child(2) { animation-delay: 0.1s; }
    .step-section:nth-child(3) { animation-delay: 0.2s; }
    .step-section:nth-child(4) { animation-delay: 0.3s; }

    @keyframes sectionIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-title {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border-active);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gold);
      background: rgba(196, 155, 92, 0.06);
      flex-shrink: 0;
    }

    /* ---- Style Cards Grid ---- */
    .style-cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .style-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 24px 18px 22px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
      position: relative;
      overflow: hidden;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .style-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(196, 155, 92, 0.06), transparent 70%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .style-card:hover {
      border-color: var(--border-active);
      transform: translateY(-3px);
      box-shadow: var(--shadow-gold), var(--shadow-md);
    }
    .style-card:hover::before { opacity: 1; }
    .style-card.active {
      border-color: var(--gold);
      background: var(--bg-elevated);
      box-shadow: var(--shadow-gold), 0 0 0 1px rgba(196, 155, 92, 0.2);
      transform: translateY(-2px);
    }
    .style-card.active::before { opacity: 1; }
    .style-card .style-icon {
      font-size: 2.4rem;
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }
    .style-card:hover .style-icon { transform: scale(1.08); }
    .style-card.active .style-icon { transform: scale(1.1); }
    .style-card .style-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
    }
    .style-card .style-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.4;
      position: relative;
      z-index: 1;
    }

    /* ---- Config Section ---- */
    #config-section {
      display: none;
    }
    #config-section.visible {
      display: block;
    }

    /* ---- Dimension Block ---- */
    .dimension-block {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 20px 22px;
      margin-bottom: 16px;
      transition: border-color 0.3s ease;
    }
    .dimension-block:hover {
      border-color: rgba(196, 155, 92, 0.15);
    }
    .dim-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .dim-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .dim-tip {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }
    .badge.required {
      background: rgba(194, 84, 61, 0.15);
      color: var(--vermillion-light);
    }
    .badge.optional {
      background: rgba(104, 158, 158, 0.12);
      color: var(--teal-light);
    }
    .multi-hint {
      font-size: 0.7rem;
      color: var(--gold);
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(196, 155, 92, 0.1);
      letter-spacing: 0.03em;
    }

    /* ---- Subject Input ---- */
    .subject-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-code);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: var(--font-ui);
      transition: all 0.25s ease;
      outline: none;
    }
    .subject-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(196, 155, 92, 0.08);
    }
    .subject-input::placeholder {
      color: var(--text-muted);
    }

    /* ---- Options Grid ---- */
    .options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .option-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--bg-code);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-secondary);
      transition: all 0.22s ease;
      user-select: none;
      white-space: nowrap;
    }
    .option-chip:hover {
      border-color: var(--border-active);
      color: var(--text-primary);
      background: var(--bg-elevated);
    }
    .option-chip.selected {
      background: rgba(196, 155, 92, 0.12);
      border-color: var(--gold);
      color: var(--gold-light);
      box-shadow: 0 0 12px rgba(196, 155, 92, 0.08);
    }
    .opt-tag {
      font-size: 0.68rem;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(104, 158, 158, 0.12);
      color: var(--teal-light);
      letter-spacing: 0.02em;
    }

    /* ---- Result Section ---- */
    .result-section {
      animation: sectionIn 0.7s ease 0.35s both;
    }
    .prompt-block {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      margin-bottom: 18px;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }
    .prompt-block:hover {
      border-color: var(--border-active);
    }
    .prompt-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .copy-btn {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.22s ease;
      font-family: var(--font-ui);
      letter-spacing: 0.03em;
    }
    .copy-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(196, 155, 92, 0.06);
    }
    .copy-btn:active {
      transform: scale(0.96);
    }
    .prompt-output {
      padding: 18px 20px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--text-primary);
      background: var(--bg-code);
      min-height: 60px;
      word-break: break-all;
      letter-spacing: 0.01em;
    }
    .prompt-output:empty::after {
      content: '等待配置...';
      color: var(--text-muted);
      font-style: italic;
    }
    .prompt-output.negative {
      color: var(--text-muted);
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--bg-elevated);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-family: var(--font-ui);
      z-index: 100;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
      pointer-events: none;
      box-shadow: var(--shadow-md), 0 0 24px rgba(196, 155, 92, 0.12);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---- Responsive ---- */
    @media (max-width: 900px) {
      .style-cards-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .style-card .style-icon { font-size: 2rem; }
      .style-card .style-name { font-size: 0.95rem; }
    }
    @media (max-width: 768px) {
      .container { padding: 32px 16px 60px; }
      .site-header { padding: 36px 0 28px; }
      .style-cards-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .style-card { padding: 18px 14px 16px; }
      .style-card .style-icon { font-size: 1.8rem; }
      .style-card .style-name { font-size: 0.9rem; }
      .dim-header { flex-wrap: wrap; }
      .dim-tip { display: none; }
      .options-grid { gap: 6px; }
      .option-chip { padding: 6px 10px; font-size: 0.76rem; }
    }

    @media (max-width: 480px) {
      .style-cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>
<body>

  <div class="spotlight spotlight--top"></div>
  <div class="spotlight spotlight--bottom"></div>

  <div class="container">

    <header class="site-header">
      <h1>The Prompt <span class="accent">Atelier</span></h1>
      <p>文生图 · 提示词工坊</p>
    </header>

    <!-- Step 1: 选择风格 -->
    <section class="step-section">
      <h2 class="step-title">
        <span class="step-num">01</span> 选择图片风格
      </h2>
      <div id="style-cards" class="style-cards-grid"></div>
    </section>

    <!-- Step 2: 配置参数 -->
    <section class="step-section" id="config-section">
      <h2 class="step-title">
        <span class="step-num">02</span> 配置画面参数
      </h2>
      <div id="dimensions-container"></div>
    </section>

    <!-- Step 3: 生成结果 -->
    <section class="step-section result-section">
      <h2 class="step-title">
        <span class="step-num">03</span> 生成的提示词
      </h2>

      <div class="prompt-block">
        <div class="prompt-block-header">
          <span>✦ 正向提示词</span>
          <button class="copy-btn" onclick="copyPrompt('positive')">复制</button>
        </div>
        <div id="positive-output" class="prompt-output"></div>
      </div>

      <div class="prompt-block">
        <div class="prompt-block-header">
          <span>✧ 反向提示词</span>
          <button class="copy-btn" onclick="copyPrompt('negative')">复制</button>
        </div>
        <div id="negative-output" class="prompt-output negative"></div>
      </div>
    </section>

  </div>

  <div id="toast" class="toast"></div>

  <!-- ============================================================
       DATA LAYER — 完全数据与逻辑分离
       ============================================================ -->
  <script>
    /* ========== styles.js — 风格类型定义 ========== */
    const STYLE_TYPES = [
      {
        id: 'anime',
        name: '动漫插画',
        icon: '🎌',
        desc: '二次元 · ACG · 日系插画',
        dimensions: ['artStyle','subject','character','scene','lighting','composition','colorTone','emotion','quality'],
        promptOrder: ['quality','artStyle','subject','character','scene','lighting','composition','colorTone','emotion'],
        defaultNegative: 'lowres, bad anatomy, bad hands, missing fingers, extra fingers, blurry, worst quality, low quality, jpeg artifacts',
      },
      {
        id: 'realistic',
        name: '写实摄影',
        icon: '📷',
        desc: '人像 · 风景 · 产品摄影',
        dimensions: ['subject','scene','lighting','cameraParams','composition','colorTone','skinDetail','emotion','quality'],
        promptOrder: ['subject','scene','lighting','cameraParams','composition','colorTone','skinDetail','emotion','quality'],
        defaultNegative: 'cartoon, anime, illustration, painting, drawing, art, render, cgi, blurry, out of focus, bad anatomy, deformed',
      },
      {
        id: 'concept',
        name: '概念艺术',
        icon: '🌌',
        desc: '奇幻 · 科幻 · 史诗场景',
        dimensions: ['subject','worldSetting','scene','lighting','specialEffect','composition','colorTone','emotion','quality'],
        promptOrder: ['quality','subject','worldSetting','scene','lighting','specialEffect','composition','colorTone','emotion'],
        defaultNegative: 'photo, realistic, photograph, blurry, bad anatomy, worst quality, low quality',
      },
      {
        id: 'design',
        name: '设计风格',
        icon: '🎨',
        desc: '海报 · 品牌 · UI 设计',
        dimensions: ['designType','subject','colorTone','designStyle','layout','emotion','quality'],
        promptOrder: ['designType','designStyle','subject','colorTone','layout','emotion','quality'],
        defaultNegative: 'photo, realistic, blurry, noisy, cluttered, messy layout, bad typography',
      },
      {
        id: '3d-render',
        name: '3D 渲染',
        icon: '💎',
        desc: 'C4D · Blender · 产品渲染',
        dimensions: ['renderEngine','subject','material','lighting','cameraAngle','scene','colorTone','emotion','quality'],
        promptOrder: ['renderEngine','subject','material','lighting','cameraAngle','scene','colorTone','emotion','quality'],
        defaultNegative: '2d, painting, drawing, sketch, photo, low resolution, low poly, bad geometry, distorted',
      },
      {
        id: 'ink-painting',
        name: '水墨国画',
        icon: '🖌️',
        desc: '写意 · 工笔 · 东方美学',
        dimensions: ['inkStyle','subject','brushwork','scene','composition','colorTone','emotion','sealText','quality'],
        promptOrder: ['inkStyle','subject','brushwork','scene','composition','colorTone','emotion','sealText','quality'],
        defaultNegative: 'photo, 3d, realistic, western painting, oil painting, cartoon, anime, digital art',
      },
      {
        id: 'pixel-art',
        name: '像素艺术',
        icon: '👾',
        desc: '8-bit · 16-bit · 复古游戏',
        dimensions: ['pixelStyle','subject','scene','colorPalette','composition','emotion','quality'],
        promptOrder: ['pixelStyle','subject','scene','colorPalette','composition','emotion','quality'],
        defaultNegative: 'high resolution, realistic, photo, 3d, smooth, blurry, anti-aliasing',
      },
      {
        id: 'oil-painting',
        name: '油画艺术',
        icon: '🖼️',
        desc: '印象派 · 古典 · 巴洛克',
        dimensions: ['paintingStyle','subject','brushwork','scene','lighting','composition','colorTone','emotion','quality'],
        promptOrder: ['paintingStyle','subject','brushwork','scene','lighting','composition','colorTone','emotion','quality'],
        defaultNegative: 'photo, 3d, digital art, cartoon, anime, flat, vector, low quality',
      },
    ];

    /* ========== dimensions.js — 维度元信息 ========== */
    const DIMENSIONS = {
      subject:       { id:'subject',       name:'主体描述',   type:'input',        placeholder:'描述画面主体，例如：一个穿红色连衣裙的少女', required:true,  tip:'主体是画面的核心，描述越具体效果越好' },
      artStyle:      { id:'artStyle',      name:'画风',       type:'single-select', required:true,  tip:'决定整体视觉风格' },
      character:     { id:'character',     name:'角色细节',   type:'multi-select',  required:false, tip:'可多选，叠加角色特征' },
      scene:         { id:'scene',         name:'场景背景',   type:'single-select', required:false, tip:'画面所处的环境' },
      lighting:      { id:'lighting',      name:'光线',       type:'single-select', required:false, tip:'光线对氛围影响极大' },
      composition:   { id:'composition',   name:'构图视角',   type:'single-select', required:false, tip:'镜头角度和景别' },
      colorTone:     { id:'colorTone',     name:'色调',       type:'single-select', required:false, tip:'整体色彩倾向' },
      emotion:       { id:'emotion',       name:'情绪氛围',   type:'single-select', required:false, tip:'画面传达的情感' },
      quality:       { id:'quality',       name:'质量词',     type:'multi-select',  required:true,  tip:'影响画面精细程度' },
      cameraParams:  { id:'cameraParams',  name:'摄影参数',   type:'single-select', required:false, tip:'模拟真实相机效果' },
      skinDetail:    { id:'skinDetail',    name:'皮肤质感',   type:'single-select', required:false, tip:'写实人像专属' },
      worldSetting:  { id:'worldSetting',  name:'世界观设定', type:'single-select', required:false, tip:'概念艺术的背景世界' },
      specialEffect: { id:'specialEffect', name:'特效',       type:'multi-select',  required:false, tip:'魔法、粒子等视觉特效' },

  <script>
    /* ========== generator.js — 提示词拼接逻辑 ========== */
    const state = {
      styleId: null,
      selections: {},
      customSubject: '',
    };

    function generatePrompt() {
      const style = STYLE_TYPES.find(s => s.id === state.styleId);
      if (!style) return { positive: '', negative: '' };

      const parts = [];

      style.promptOrder.forEach(dimId => {
        if (dimId === 'subject') {
          if (state.customSubject.trim()) {
            parts.push(state.customSubject.trim());
          }
          return;
        }

        const selection = state.selections[dimId];
        if (!selection) return;

        if (Array.isArray(selection)) {
          const values = selection.map(label => {
            const opt = OPTIONS[dimId]?.find(o => o.label === label);
            return opt ? opt.value : '';
          }).filter(Boolean);
          if (values.length) parts.push(values.join(', '));
        } else {
          const opt = OPTIONS[dimId]?.find(o => o.label === selection);
          if (opt) parts.push(opt.value);
        }
      });

      return {
        positive: parts.join(', '),
        negative: style.defaultNegative,
      };
    }

    /* ========== app.js — 渲染与交互 ========== */

    function renderStyleCards() {
      const container = document.getElementById('style-cards');
      container.innerHTML = STYLE_TYPES.map(style => `
        <div class="style-card" data-id="${style.id}" onclick="selectStyle('${style.id}')">
          <span class="style-icon">${style.icon}</span>
          <span class="style-name">${style.name}</span>
          <span class="style-desc">${style.desc}</span>
        </div>
      `).join('');
    }

    function selectStyle(styleId) {
      state.styleId = styleId;
      state.selections = {};
      state.customSubject = '';

      // 高亮选中卡片
      document.querySelectorAll('.style-card').forEach(el => {
        el.classList.toggle('active', el.dataset.id === styleId);
      });

      const style = STYLE_TYPES.find(s => s.id === styleId);
      const container = document.getElementById('dimensions-container');

      container.innerHTML = style.dimensions.map(dimId => {
        const dim = DIMENSIONS[dimId];
        return renderDimension(dim);
      }).join('');

      // 显示配置区域
      const configSection = document.getElementById('config-section');
      configSection.classList.add('visible');
      // 触发 animation
      configSection.style.animation = 'none';
      configSection.offsetHeight;
      configSection.style.animation = '';

      updatePreview();
      // 平滑滚动到配置区
      configSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderDimension(dim) {
      const requiredBadge = dim.required
        ? '<span class="badge required">必填</span>'
        : '<span class="badge optional">可选</span>';

      if (dim.type === 'input') {
        return `
          <div class="dimension-block" id="dim-${dim.id}">
            <div class="dim-header">
              <span class="dim-name">${dim.name}</span>
              ${requiredBadge}
              <span class="dim-tip">${dim.tip}</span>
            </div>
            <input
              type="text"
              class="subject-input"
              placeholder="${dim.placeholder}"
              oninput="onSubjectInput(this.value)"
              value="${escapeHtml(state.customSubject)}"
            />
          </div>
        `;
      }

      const opts = OPTIONS[dim.id] || [];
      const isMulti = dim.type === 'multi-select';

      return `
        <div class="dimension-block" id="dim-${dim.id}">
          <div class="dim-header">
            <span class="dim-name">${dim.name}</span>
            ${requiredBadge}
            ${isMulti ? '<span class="multi-hint">可多选</span>' : ''}
            <span class="dim-tip">${dim.tip}</span>
          </div>
          <div class="options-grid">
            ${opts.map(opt => `
              <div
                class="option-chip"
                data-dim="${dim.id}"
                data-label="${escapeAttr(opt.label)}"
                onclick="toggleOption('${dim.id}', '${escapeAttr(opt.label)}', ${isMulti})"
              >
                ${opt.label}
                ${opt.tag ? `<span class="opt-tag">${opt.tag}</span>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function toggleOption(dimId, label, isMulti) {
      if (isMulti) {
        if (!state.selections[dimId]) state.selections[dimId] = [];
        const idx = state.selections[dimId].indexOf(label);
        if (idx > -1) {
          state.selections[dimId].splice(idx, 1);
        } else {
          state.selections[dimId].push(label);
        }
      } else {
        state.selections[dimId] = state.selections[dimId] === label ? null : label;
      }

      // 更新 UI 高亮
      const chips = document.querySelectorAll(`[data-dim="${dimId}"]`);
      chips.forEach(chip => {
        const isSelected = isMulti
          ? state.selections[dimId]?.includes(chip.dataset.label)
          : state.selections[dimId] === chip.dataset.label;
        chip.classList.toggle('selected', isSelected);
      });

      updatePreview();
    }

    function onSubjectInput(value) {
      state.customSubject = value;
      updatePreview();
    }

    function updatePreview() {
      const { positive, negative } = generatePrompt();

      const posEl = document.getElementById('positive-output');
      const negEl = document.getElementById('negative-output');

      if (positive) {
        posEl.textContent = positive;
      } else {
        posEl.textContent = '';
      }
      negEl.textContent = negative || '';
    }

    function copyPrompt(type) {
      const { positive, negative } = generatePrompt();
      const text = type === 'positive' ? positive : negative;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板 ✦');
      }).catch(() => {
        showToast('复制失败，请手动选择');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ---- 初始化 ----
    document.addEventListener('DOMContentLoaded', () => {
      renderStyleCards();
    });
  </script>

</body>
</html>
