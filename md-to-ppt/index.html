<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 演示文稿 — WebPages</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       Markdown 演示文稿 — Spotlight Stage 风格
       ================================================================ */
    :root {
      --bg:       #1a1d23;
      --surface:  #21252b;
      --text:     #cdd6e0;
      --text-dim: #6b7380;
      --border:   #323842;
      --accent:   #e2b04a;
      --accent-dim: rgba(226,176,74,0.12);
      --radius:   10px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      height:100vh; overflow:hidden; display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }

    /* ====== 导航 ====== */
    .header{flex-shrink:0;z-index:100;background:rgba(26,29,35,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .header-inner{max-width:1400px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;justify-content:space-between}
    .back-link{display:flex;align-items:center;gap:5px;color:var(--text-dim);text-decoration:none;font-size:13px;transition:color .2s}
    .back-link:hover{color:var(--accent)}
    .back-link svg{width:16px;height:16px}
    .header-title{display:flex;align-items:center;gap:10px}
    .header-icon{width:30px;height:30px;background:var(--accent);color:#1a1d23;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border-radius:6px}
    .header-label{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.2px}
    .header-spacer{width:60px}

    /* ====== 主布局 ====== */
    .main{flex:1;min-height:0;overflow:hidden;display:flex;max-width:1400px;width:100%;margin:0 auto;padding:14px 24px 14px}

    /* 工具栏 */
    .tool-col{display:flex;flex-direction:column;gap:10px;padding-right:16px;flex-shrink:0;width:160px}
    .tool-col .section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:2px}
    .theme-btn,.trans-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;border-radius:6px;white-space:nowrap}
    .theme-btn:hover,.trans-btn:hover{border-color:var(--accent);color:var(--accent)}
    .theme-btn.active,.trans-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .theme-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .theme-dot.stage{background:linear-gradient(135deg,#2c3e50,#1a1a2e)}
    .theme-dot.light{background:linear-gradient(135deg,#f0f0f0,#e0e0e0)}
    .theme-dot.gradient{background:linear-gradient(135deg,#667eea,#764ba2)}
    .theme-dot.terminal{background:#0a0;box-shadow:0 0 6px #0a0}

    .present-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0;background:var(--accent);color:#1a1d23;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:auto}
    .present-btn:hover{filter:brightness(1.1);box-shadow:0 4px 20px rgba(226,176,74,.3)}

    /* 编辑器 */
    .editor-col{flex:1;min-width:0;display:flex;flex-direction:column}
    .editor-col .panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:8px}
    .editor-col .panel-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim)}
    .editor-col textarea{flex:1;min-height:0;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.7;resize:none;outline:none;transition:border-color .2s}
    .editor-col textarea:focus{border-color:var(--accent)}
    .editor-col textarea::placeholder{color:#4a5058}
    .stats-row{display:flex;gap:12px;padding-top:6px;font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace}

    /* 预览 */
    .preview-col{flex:1;min-width:0;display:flex;flex-direction:column;margin-left:16px}
    .preview-col .panel-header{padding:8px 0;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
    .preview-col .panel-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim)}
    .slide-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
    .slide-list::-webkit-scrollbar{width:4px}
    .slide-list::-webkit-scrollbar-track{background:transparent}
    .slide-list::-webkit-scrollbar-thumb{background:#3a4050;border-radius:2px}
    .slide-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:18px 20px;font-size:12px;line-height:1.6;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;min-height:80px}
    .slide-card:hover{border-color:var(--accent-dim)}
    .slide-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
    .slide-card .slide-num{position:absolute;top:8px;right:10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim)}
    .slide-card h1,.slide-card h2{font-size:14px;margin-bottom:4px;color:var(--text)}
    .slide-card p{color:var(--text-dim);margin:0}
    .slide-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:13px;text-align:center;padding:24px}

    /* ====== 演示模式覆盖层 ====== */
    .stage-overlay{position:fixed;inset:0;z-index:999;background:#0d0f14;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:none}
    .stage-overlay.active{display:flex}
    .stage-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:80px 100px;opacity:0;pointer-events:none}
    .stage-slide.current{opacity:1;pointer-events:auto;z-index:2}
    .stage-slide .slide-content{max-width:900px;width:100%}
    .stage-slide h1{font-size:48px;font-weight:700;margin-bottom:20px;line-height:1.2}
    .stage-slide h2{font-size:36px;font-weight:600;margin-bottom:16px;line-height:1.3}
    .stage-slide h3{font-size:26px;font-weight:600;margin-bottom:12px}
    .stage-slide p{font-size:22px;line-height:1.7;margin-bottom:14px}
    .stage-slide ul,.stage-slide ol{padding-left:32px;margin-bottom:14px}
    .stage-slide li{font-size:22px;line-height:1.8;margin-bottom:8px}
    .stage-slide code{font-size:18px;padding:3px 8px;border-radius:4px;font-family:'DM Mono',monospace}
    .stage-slide pre{font-size:16px;padding:20px 24px;border-radius:8px;overflow-x:auto;margin:16px 0;font-family:'DM Mono',monospace;line-height:1.6}
    .stage-slide blockquote{font-size:22px;border-left:4px solid;padding-left:20px;margin:16px 0;font-style:italic;opacity:.85}
    .stage-slide hr{border:none;border-top:2px solid;margin:24px 0;opacity:.3}

    /* 舞台控件 */
    .stage-controls{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:12px;opacity:0;transition:opacity .3s}
    .stage-overlay:hover .stage-controls,.stage-controls.show{opacity:1}
    .stage-ctrl{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px)}
    .stage-ctrl:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}
    .stage-ctrl svg{width:18px;height:18px}
    .slide-counter{font-family:'DM Mono',monospace;font-size:13px;color:rgba(255,255,255,.5);min-width:60px;text-align:center}
    .stage-exit{position:fixed;top:20px;right:20px;z-index:10;padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.5);color:#fff;font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;backdrop-filter:blur(8px)}
    .stage-exit:hover{background:rgba(255,255,255,.15)}

    /* 激光笔 */
    .laser{position:fixed;pointer-events:none;z-index:20;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#ff3b3b 0%,rgba(255,60,60,.6) 30%,transparent 70%);transform:translate(-50%,-50%);filter:blur(1px);display:none}
    .laser.on{display:block}
    .laser::after{content:'';position:absolute;inset:-6px;border-radius:50%;background:transparent;box-shadow:0 0 14px 4px rgba(255,60,60,.5)}

    /* 响应式 */
    @media(max-width:860px){
      .main{flex-direction:column;padding:10px 12px;gap:10px;overflow-y:auto}
      .tool-col{flex-direction:row;flex-wrap:wrap;width:100%;padding-right:0;gap:6px}
      .present-btn{margin-top:0;padding:8px 16px;font-size:12px}
      .preview-col{margin-left:0;min-height:200px}
      .stage-slide{padding:40px 24px}
      .stage-slide h1{font-size:30px}
      .stage-slide h2{font-size:24px}
      .stage-slide p,.stage-slide li{font-size:17px}
    }
  </style>
</head>
<body>

  <!-- ====== 导航 ====== -->
  <header class="header">
    <div class="header-inner">
      <a href="../" class="back-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>返回
      </a>
      <div class="header-title">
        <div class="header-icon">▶</div>
        <span class="header-label">演示文稿</span>
      </div>
      <div class="header-spacer"></div>
    </div>
  </header>

  <!-- ====== 主内容 ====== -->
  <main class="main">
    <!-- 左侧工具栏 -->
    <div class="tool-col">
      <span class="section-label">主题</span>
      <button class="theme-btn active" data-theme="stage"><span class="theme-dot stage"></span>暗夜舞台</button>
      <button class="theme-btn" data-theme="light"><span class="theme-dot light"></span>极简白</button>
      <button class="theme-btn" data-theme="gradient"><span class="theme-dot gradient"></span>渐变紫</button>
      <button class="theme-btn" data-theme="terminal"><span class="theme-dot terminal"></span>终端绿</button>
      <span class="section-label" style="margin-top:4px">过渡</span>
      <button class="trans-btn active" data-trans="fade">淡入淡出</button>
      <button class="trans-btn" data-trans="slide">左右滑动</button>
      <button class="trans-btn" data-trans="zoom">缩放</button>
      <button class="btn-present present-btn" id="btnPresent">▶ 开始演示</button>
    </div>

    <!-- 中间编辑器 -->
    <div class="editor-col">
      <div class="panel-header">
        <span class="panel-label">✎ Markdown</span>
        <span style="font-size:10px;color:var(--text-dim)" id="hintText">用 --- 分隔幻灯片</span>
      </div>
      <textarea id="editor" placeholder="# 第一页标题&#10;&#10;这是第一页的内容&#10;&#10;---&#10;&#10;## 第二页&#10;&#10;- 要点一&#10;- 要点二&#10;- 要点三&#10;&#10;---&#10;&#10;# 结束页&#10;&#10;> 谢谢观看 🎉" spellcheck="false"></textarea>
      <div class="stats-row">
        <span id="countSlides">幻灯片：0 页</span>
        <span id="countChars">字符：0</span>
      </div>
    </div>

    <!-- 右侧预览 -->
    <div class="preview-col">
      <div class="panel-header">
        <span class="panel-label">◉ 幻灯片预览</span>
        <span style="font-size:10px;color:var(--text-dim)" id="currentSlide">第 1 页</span>
      </div>
      <div class="slide-list" id="slideList">
        <div class="slide-empty">在左侧输入 Markdown<br>用 --- 分隔每一页幻灯片</div>
      </div>
    </div>
  </main>

  <!-- ====== 演示模式 ====== -->
  <div class="stage-overlay" id="stageOverlay">
    <div id="stageContent"></div>
    <div class="stage-controls" id="stageControls">
      <button class="stage-ctrl" id="btnPrev" title="上一页 (←)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
      <span class="slide-counter" id="slideCounter">1 / 1</span>
      <button class="stage-ctrl" id="btnNext" title="下一页 (→)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
    </div>
    <button class="stage-exit" id="btnExit">✕ 退出 (Esc)</button>
    <div class="laser" id="laserPointer"></div>
  </div>

  <!-- ====== JS ====== -->
  <script>
  (function(){
    'use strict';

    /* ====== 主题定义 ====== */
    var themes = {
      stage: {
        name:'暗夜舞台',
        bg:'#0d0f14', text:'#e8e8ec', accent:'#e2b04a',
        h1c:'#e2b04a', h2c:'#d4d8e0', h3c:'#b8bec8',
        codeBg:'#1a1d26', codeC:'#e2b04a',
        preBg:'#151820', preC:'#c8ccd4',
        blockquoteBorder:'#e2b04a', blockquoteC:'#b0b5bf',
        subBg:'#101218', hrC:'rgba(255,255,255,.1)',
        linkC:'#e2b04a'
      },
      light: {
        name:'极简白',
        bg:'#f8f9fa', text:'#2d2d2d', accent:'#3b82f6',
        h1c:'#1a1a2e', h2c:'#2d2d2d', h3c:'#444',
        codeBg:'#eef2ff', codeC:'#3b82f6',
        preBg:'#f0f0f3', preC:'#2d2d2d',
        blockquoteBorder:'#3b82f6', blockquoteC:'#555',
        subBg:'#f0f1f3', hrC:'rgba(0,0,0,.1)',
        linkC:'#3b82f6'
      },
      gradient: {
        name:'渐变紫',
        bg:'#1a0a2e', text:'#e8dff0', accent:'#a78bfa',
        h1c:'#c4b5fd', h2c:'#ddd6fe', h3c:'#c4b5fd',
        codeBg:'#2d1b4e', codeC:'#a78bfa',
        preBg:'#1e1035', preC:'#d8cce8',
        blockquoteBorder:'#7c3aed', blockquoteC:'#c4b5fd',
        subBg:'#160828', hrC:'rgba(167,139,250,.2)',
        linkC:'#a78bfa'
      },
      terminal: {
        name:'终端绿',
        bg:'#0a0e0a', text:'#00ff41', accent:'#00ff41',
        h1c:'#00ff41', h2c:'#00cc33', h3c:'#00aa2a',
        codeBg:'#0d1a0d', codeC:'#00ff41',
        preBg:'#0a140a', preC:'#00cc33',
        blockquoteBorder:'#00ff41', blockquoteC:'#00cc33',
        subBg:'#080c08', hrC:'rgba(0,255,65,.2)',
        linkC:'#00ff41'
      }
    };

    /* ====== DOM ====== */
    var editor      = document.getElementById('editor');
    var slideList   = document.getElementById('slideList');
    var stageOverlay= document.getElementById('stageOverlay');
    var stageContent= document.getElementById('stageContent');
    var laserPointer= document.getElementById('laserPointer');
    var slideCounter= document.getElementById('slideCounter');
    var currentSlideEl = document.getElementById('currentSlide');
    var countSlides = document.getElementById('countSlides');
    var countChars  = document.getElementById('countChars');
    var hintText    = document.getElementById('hintText');
    var stageControls = document.getElementById('stageControls');

    var currentTheme = 'stage';
    var currentTrans = 'fade';
    var slides = [];
    var stageIndex = 0;
    var isPresenting = false;
    var laserOn = false;
    var isTransitioning = false;

    /* ====== 解析幻灯片 ====== */
    function parseSlides(md){
      if(!md||!md.trim())return[];
      var parts = md.split(/\n\s*---\s*\n/);
      return parts.map(function(p){return p.trim();}).filter(function(p){return p.length>0;});
    }

    /* ====== 应用主题到幻灯片 HTML ====== */
    function applyThemeToSlide(html, themeName){
      var t = themes[themeName];
      return '<div class="slide-content" style="color:'+t.text+'">' + html + '</div>';
    }

    /* ====== 渲染预览列表 ====== */
    function renderPreview(){
      slides = parseSlides(editor.value);
      countSlides.textContent = '幻灯片：'+slides.length+' 页';
      countChars.textContent = '字符：'+editor.value.length;

      if(slides.length===0){
        slideList.innerHTML='<div class="slide-empty">在左侧输入 Markdown<br>用 --- 分隔每一页幻灯片</div>';
        currentSlideEl.textContent='无内容';
        return;
      }

      currentSlideEl.textContent='共 '+slides.length+' 页';
      var html='';
      for(var i=0;i<slides.length;i++){
        var slideHtml;
        try{slideHtml=marked.parse(slides[i]);}catch(e){slideHtml='<p>解析错误</p>';}
        html+='<div class="slide-card" data-index="'+i+'" onclick="selectPreviewSlide('+i+')">'+
              '<span class="slide-num">'+(i+1)+'/'+slides.length+'</span>'+
              slideHtml+
              '</div>';
      }
      slideList.innerHTML=html;
    }

    /* ====== 渲染舞台幻灯片 ====== */
    function renderStageSlide(index){
      if(index<0||index>=slides.length)return;
      var t=themes[currentTheme];
      try{var rawHtml=marked.parse(slides[index]);}catch(e){rawHtml='<p>解析错误</p>';}

      var wrap=document.createElement('div');
      wrap.className='stage-slide';
      wrap.style.cssText='background:'+t.bg+';color:'+t.text;
      wrap.innerHTML='<div class="slide-content">'+rawHtml+'</div>';

      // 注入主题样式到 slide-content 内
      var sc=wrap.querySelector('.slide-content');
      if(sc){
        sc.style.cssText='max-width:900px;width:100%;color:'+t.text;
      }
      // 给特定元素加色
      ['h1','h2','h3'].forEach(function(tag,i){
        var els=wrap.querySelectorAll(tag);
        var colors=[t.h1c,t.h2c,t.h3c];
        for(var j=0;j<els.length;j++){els[j].style.color=colors[i];}
      });
      wrap.querySelectorAll('code').forEach(function(el){
        if(el.parentElement&&el.parentElement.tagName==='PRE')return;
        el.style.cssText='font-size:18px;padding:3px 8px;border-radius:4px;background:'+t.codeBg+';color:'+t.codeC+';font-family:"DM Mono",monospace';
      });
      wrap.querySelectorAll('pre').forEach(function(el){
        el.style.cssText='font-size:16px;padding:20px 24px;border-radius:8px;overflow-x:auto;margin:16px 0;background:'+t.preBg+';color:'+t.preC+';font-family:"DM Mono",monospace;line-height:1.6';
      });
      wrap.querySelectorAll('blockquote').forEach(function(el){
        el.style.cssText='font-size:22px;border-left:4px solid '+t.blockquoteBorder+';padding-left:20px;margin:16px 0;font-style:italic;color:'+t.blockquoteC;
      });
      wrap.querySelectorAll('a').forEach(function(el){
        el.style.color=t.linkC;
      });
      wrap.querySelectorAll('hr').forEach(function(el){
        el.style.cssText='border:none;border-top:2px solid '+t.hrC+';margin:24px 0';
      });
      wrap.querySelectorAll('li').forEach(function(el){
        el.style.cssText='font-size:22px;line-height:1.8;margin-bottom:8px;color:'+t.text;
      });
      wrap.querySelectorAll('p').forEach(function(el){
        if(!el.style.color)el.style.color=t.text;
      });

      return wrap;
    }

    /* ====== 演示模式 - 显示幻灯片 ====== */
    function showStageSlide(index, direction){
      if(isTransitioning)return;
      if(index<0||index>=slides.length)return;
      isTransitioning=true;

      var oldSlide=stageContent.querySelector('.stage-slide.current');
      var newSlide=renderStageSlide(index);
      newSlide.classList.add('current');
      stageContent.appendChild(newSlide);

      slideCounter.textContent=(index+1)+' / '+slides.length;

      // GSAP 过渡动画
      var fromX=direction>0?120:-120;
      var tl=gsap.timeline({onComplete:function(){
        if(oldSlide){oldSlide.remove();}
        isTransitioning=false;
      }});

      if(currentTrans==='fade'){
        if(oldSlide)tl.to(oldSlide,{autoAlpha:0,duration:.35,ease:'power2.in'},0);
        gsap.set(newSlide,{autoAlpha:0});
        tl.to(newSlide,{autoAlpha:1,duration:.4,ease:'power2.out'},oldSlide?.15:0);
      }else if(currentTrans==='slide'){
        if(oldSlide)tl.to(oldSlide,{x:-fromX,autoAlpha:0,duration:.35,ease:'power2.in'},0);
        gsap.set(newSlide,{x:fromX,autoAlpha:0});
        tl.to(newSlide,{x:0,autoAlpha:1,duration:.4,ease:'power3.out'},oldSlide?.1:0);
      }else if(currentTrans==='zoom'){
        if(oldSlide)tl.to(oldSlide,{scale:.85,autoAlpha:0,duration:.3,ease:'power2.in'},0);
        gsap.set(newSlide,{scale:1.15,autoAlpha:0});
        tl.to(newSlide,{scale:1,autoAlpha:1,duration:.4,ease:'back.out(1.3)'},oldSlide?.1:0);
      }
    }

    /* ====== 进入演示模式 ====== */
    function enterPresent(){
      slides=parseSlides(editor.value);
      if(slides.length===0){showToast('请先输入 Markdown 内容并生成幻灯片');return;}
      isPresenting=true;
      stageIndex=0;
      stageOverlay.classList.add('active');
      stageContent.innerHTML='';

      var el=stageOverlay;
      if(el.requestFullscreen){el.requestFullscreen().catch(function(){})}
      else if(el.webkitRequestFullscreen){el.webkitRequestFullscreen()}

      showStageSlide(0,1);
      // 显示控件短暂时间
      stageControls.classList.add('show');
      setTimeout(function(){stageControls.classList.remove('show');},2500);
    }

    function exitPresent(){
      isPresenting=false;
      stageOverlay.classList.remove('active');
      stageContent.innerHTML='';
      laserPointer.classList.remove('on');
      laserOn=false;
      if(document.fullscreenElement){document.exitFullscreen().catch(function(){})}
      else if(document.webkitFullscreenElement){document.webkitExitFullscreen()}
    }

    function nextSlide(){if(isPresenting){showStageSlide(stageIndex+1,1);stageIndex++;}}
    function prevSlide(){if(isPresenting){showStageSlide(stageIndex-1,-1);stageIndex--;}}

    /* ====== 激光笔 ====== */
    document.addEventListener('mousemove',function(e){
      if(!isPresenting)return;
      laserPointer.style.left=e.clientX+'px';
      laserPointer.style.top=e.clientY+'px';
    });

    /* ====== 事件绑定 ====== */
    document.getElementById('btnPresent').addEventListener('click',enterPresent);
    document.getElementById('btnExit').addEventListener('click',exitPresent);
    document.getElementById('btnPrev').addEventListener('click',prevSlide);
    document.getElementById('btnNext').addEventListener('click',nextSlide);

    // 键盘
    document.addEventListener('keydown',function(e){
      if(!isPresenting){
        // 编辑器内 Ctrl+Enter 演示
        if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();enterPresent();}
        return;
      }
      switch(e.key){
        case 'ArrowRight':case 'ArrowDown':case ' ':case 'PageDown':e.preventDefault();nextSlide();break;
        case 'ArrowLeft':case 'ArrowUp':case 'PageUp':e.preventDefault();prevSlide();break;
        case 'Escape':e.preventDefault();exitPresent();break;
        case 'l':case 'L':e.preventDefault();laserOn=!laserOn;laserPointer.classList.toggle('on',laserOn);break;
        case 'Home':e.preventDefault();if(stageIndex!==0){stageIndex=0;showStageSlide(0,0);}break;
        case 'End':e.preventDefault();if(stageIndex!==slides.length-1){stageIndex=slides.length-1;showStageSlide(stageIndex,0);}break;
      }
    });

    // 点击舞台左右区域翻页
    stageOverlay.addEventListener('click',function(e){
      if(e.target.closest('.stage-ctrl')||e.target.closest('.stage-exit'))return;
      var w=window.innerWidth;
      if(e.clientX<w*.3)prevSlide();
      else if(e.clientX>w*.7)nextSlide();
    });

    // 主题/过渡切换
    document.querySelector('.tool-col').addEventListener('click',function(e){
      var btn=e.target.closest('.theme-btn');
      if(btn){
        document.querySelectorAll('.theme-btn').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');
        currentTheme=btn.dataset.theme;
        if(isPresenting){stageIndex=Math.min(stageIndex,slides.length-1);showStageSlide(stageIndex,0);}
        return;
      }
      btn=e.target.closest('.trans-btn');
      if(btn){
        document.querySelectorAll('.trans-btn').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');
        currentTrans=btn.dataset.trans;
      }
    });

    // 编辑器实时预览
    var debounce=null;
    editor.addEventListener('input',function(){
      clearTimeout(debounce);
      debounce=setTimeout(renderPreview,200);
      countChars.textContent='字符：'+editor.value.length;
    });

    // 全局函数：预览卡片点击
    window.selectPreviewSlide=function(index){
      if(isPresenting)return;
      // 滚动到对应卡片
      var cards=slideList.querySelectorAll('.slide-card');
      cards.forEach(function(c){c.classList.remove('active');});
      if(cards[index]){cards[index].classList.add('active');cards[index].scrollIntoView({behavior:'smooth',block:'center'});}
    };

    /* ====== Toast ====== */
    function showToast(msg){
      var t=document.createElement('div');
      t.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#2d333b;color:#cdd6e0;padding:10px 22px;border-radius:20px;font-size:13px;z-index:9999;border:1px solid '+themes[currentTheme].accent+';font-family:inherit;pointer-events:none';
      t.textContent=msg;
      document.body.appendChild(t);
      gsap.fromTo(t,{autoAlpha:0,y:-10},{autoAlpha:1,y:0,duration:.25});
      setTimeout(function(){gsap.to(t,{autoAlpha:0,duration:.25,onComplete:function(){t.remove()}});},1800);
    }

    /* ====== 加载示例 ====== */
    editor.value='# 🎯 Markdown 演示文稿\n\n纯 Markdown 编写，一键生成精美幻灯片\n\n---\n\n## ✨ 核心特性\n\n- **纯文本编写**：用 Markdown 写幻灯片\n- **实时预览**：所见即所得\n- **4 套主题**：暗夜舞台 / 极简白 / 渐变紫 / 终端绿\n- **3 种过渡**：淡入淡出 / 左右滑动 / 缩放\n- **激光笔**：按 L 键开启\n- **全屏演示**：沉浸式体验\n\n---\n\n## 🎨 排版能力\n\n> "好的演示文稿，让观点自己说话"\n\n支持 **粗体**、*斜体*、`行内代码`\n\n### 代码块示例\n\n```javascript\nfunction main() {\n  console.log("Hello, PPT!");\n  return "Done ✅";\n}\n```\n\n---\n\n## 📊 列表示例\n\n1. 第一步：编写 Markdown\n2. 第二步：选择主题\n3. 第三步：开始演示\n\n- 支持有序列表\n- 支持无序列表\n- 自动排版渲染\n\n---\n\n# 🙏 谢谢观看\n\n按 **Esc** 退出演示模式\n\n> 用 Markdown 写好每一页，让演示更专注内容本身';
    renderPreview();

  })();
  </script>
</body>
</html>
